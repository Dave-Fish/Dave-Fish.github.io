<!DOCTYPE html>
<html>
<head>
    <link rel="icon" type="image/png" href="face emoji copy.png" />
    <link rel="stylesheet" type="text/css" href="vr/vr.css">
<script>

    // code adapted from https://www.w3schools.com/js/js_cookies.asp
function setCookie(cname,cvalue,exdays) {
  const d = new Date();
  d.setTime(d.getTime() + (exdays*24*60*60*1000));
  let expires = "expires=" + d.toUTCString();
  document.cookie = cname + "=" + cvalue + ";" + expires + ";path=/";
}

function getCookie(cname) {
  let name = cname + "=";
  let decodedCookie = decodeURIComponent(document.cookie);
  let ca = decodedCookie.split(';');
  for(let i = 0; i < ca.length; i++) {
    let c = ca[i];
    while (c.charAt(0) == ' ') {
      c = c.substring(1);
    }
    if (c.indexOf(name) == 0) {
      return c.substring(name.length, c.length);
    }
  }
  return "";
}

function checkCookie() {
  let user = getCookie("username");
  if (user != "") {
    alert("Welcome again " + user);
  } else {
     user = prompt("Please enter your name:","");
     if (user != "" && user != null) {
       setCookie("username", user, 30);
     }
  }
}

function displayName(){
    let user = getCookie("username");
    if (user != "") {
        alert("Welcome again " + user);
        document.getElementById("nametime").innerHTML = "ayo " + user;
    } else {
        user = prompt("Please enter your name:","");
        if (user != "" && user != null) {
            setCookie("username", user, 30);
        }
    }
}

function deleteCookie(){
    setCookie("username", "", -1);
}

displayName();
</script>
</head>

<button type="button" onclick="checkCookie()" class="settings">cookie</button>
<button type="button" onclick="deleteCookie()" class="settings">cookien't</button>
