<!DOCTYPE  html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Dave Davies">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>but WHERE do you live?</title>
    <link rel="icon" type="image/png" href="face emoji copy.png" />
    <style>
        body{
            background-color: #edc;
        }
    </style>
</head>
<body>
    <canvas id="myCanvas">
    </canvas>
    <script>
        var c = document.getElementById("myCanvas");
        var ctx = c.getContext("2d");
        c.width = window.innerWidth*0.9;
        c.height = window.innerHeight*0.9;

        window.addEventListener('resize',function(event){
            c.width = window.innerWidth-5;
            c.height = window.innerHeight-5;
        })
        ctx.fillStyle = "#edc";
        ctx.fillRect(0, 0, c.width, c.height);


        occupiedPixels = [];


        drawPixel = function(hex, x, y){
            // size of villages
            if (c.height < c.width){
                s = Math.floor(c.height/150);
            }else{
                s = Math.floor(c.width/150);
            }
            

            ctx.fillStyle = hex;
            ctx.fillRect(x, y, s, s);
            occupiedPixels.push(x.toString()+","+y.toString())

            // to add the pixels in the square to occupied
            for (let i = 0; i < s; i++){
                for (let j = 0; j < s; j++){
                    occupiedPixels.push((x+i).toString()+","+(y+j).toString());
                }
            }
            console.log(occupiedPixels)
        }



        colours = [
        ["#fff", "white",   "city",   ], 
        ["#888", "grey",    "town",   ],
        ["#000", "black",   "town",   ],  
        ["#f00", "red",     "city",   ], 
        ["#840", "brown",   "village",],
        ["#f80", "orange",  "village",], 
        ["#ff0", "yellow",  "city",   ],
        ["#8f0", "lime",    "village",],
        ["#080", "green",   "village",],
        ["#0ff", "cyan",    "town",   ],
        ["#048", "blue",    "city",   ],  
        ["#88f", "purple",  "town",   ],  
        ["#f0f", "magenta", "village",], 
        ["#808", "violet",  "city",   ],
        ["#f8b", "pink",    "town",   ]]

        citySize = 225;
        townSize = 15;
        villageSize = 1;

        move = [-1, 0, 1]

        cluster = function(sX, sY, size, hex){
            for (let i = 0; i < size; i++){
                startX = sX;
                startY = sY;
                do {
                    startX += move[Math.floor(Math.random()*move.length)]
                    startY += move[Math.floor(Math.random()*move.length)]
                    if(startX < 1 || startX > c.width || startY < 1 || startY > c.height){
                        startX = sX;
                        startY = sY;
                    }
                }
                while (occupiedPixels.includes(startX.toString()+","+startY.toString()));
                drawPixel(hex, startX, startY)   
            }
        }


        // red city (center)
        cluster(c.width/2, c.height/2, citySize, "#f00")
        // white city (top)
        cluster(c.width/2, 50, citySize, "#fff")
        // violet city (bottom)
        cluster(c.width/2, c.height-50, citySize, "#808")
        // yellow city (left)
        cluster(50, c.height/2, citySize, "#ff0")
        // blue city (right)
        cluster(c.width-50, c.height/2, citySize, "#048")



        // towns
        towns = []
        // adds relevant hex codes
        colours.forEach(element => {
            if(element[2] == "town"){
                towns.push(element[0]);
            }
        });
        for(let i = 0; i < townSize; i++){
            for(let j = 0; j < towns.length; j++){
                // random starting point
                startX = Math.floor(Math.random()*c.width);
                startY = Math.floor(Math.random()*c.height);
                // occupied? then pick different coordinates
                do {
                    startX += move[Math.floor(Math.random()*move.length)]
                    startY += move[Math.floor(Math.random()*move.length)]
                    if(startX < 1 || startX > c.width || startY < 1 || startY > c.height){
                        startX = Math.floor(Math.random()*c.width);
                        startY = Math.floor(Math.random()*c.height);
                    }
                }
                while (occupiedPixels.includes(startX.toString()+","+startY.toString()));


                cluster(startX, startY, townSize, towns[j])
            }
        }

        // villages
        villages = []
        colours.forEach(element => {
            if(element[2] == "village"){
                villages.push(element[0]);
            }
        });
        for(let i = 0; i < townSize; i++){
            for(let j = 0; j < villages.length; j++){
                startX = Math.floor(Math.random()*c.width);
                startY = Math.floor(Math.random()*c.height);
                do {
                    startX += move[Math.floor(Math.random()*move.length)]
                    startY += move[Math.floor(Math.random()*move.length)]
                    if(startX < 1 || startX > c.width || startY < 1 || startY > c.height){
                        startX = Math.floor(Math.random()*c.width);
                        startY = Math.floor(Math.random()*c.height);
                    }
                }
                while (occupiedPixels.includes(startX.toString()+","+startY.toString()));


                cluster(startX, startY, villageSize, villages[j])
            }
        }

    
        
    </script>
</body>
</html>
